version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: patients_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: patients_db
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - patients_network

  patients-api:
    build:
      context: .
      dockerfile: PatientsAPI/Dockerfile
    container_name: patients_api
    ports:
      - "5000:80" 
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - patients_network

networks:
  patients_network:
    driver: bridge

volumes:
  postgres_data: